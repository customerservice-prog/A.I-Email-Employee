# Local Postgres for production-like dev. DATABASE_URL example:
# postgresql://inboxpilot:inboxpilot_dev@localhost:54329/inboxpilot
# Then: npm run db:setup && npm run db:migrate
services:
  postgres:
    image: postgres:16-alpine
    container_name: inboxpilot-postgres
    environment:
      POSTGRES_USER: inboxpilot
      POSTGRES_PASSWORD: inboxpilot_dev
      POSTGRES_DB: inboxpilot
    ports:
      - '54329:5432'
    volumes:
      - inboxpilot_pg:/var/lib/postgresql/data

volumes:
  inboxpilot_pg:
